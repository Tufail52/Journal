<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forex Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0B0E11;color:#E8EDF5;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0B0E11}::-webkit-scrollbar-thumb{background:#252D3A;border-radius:3px}
input[type="file"]{display:none}
select option{background:#131920}
textarea{resize:vertical;font-family:inherit}
input::placeholder,textarea::placeholder{color:#3D4D63}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.card{background:#131920;border:1px solid #252D3A;border-radius:14px}
.inp{background:#0C1017;border:1px solid #252D3A;border-radius:10px;padding:11px 14px;color:#E8EDF5;font-size:14px;outline:none;font-family:inherit;width:100%;box-sizing:border-box}
.inp:focus{border-color:var(--jcol,#3772FF)}
.lbl{font-size:11px;font-weight:600;color:#8896AA;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;display:block}
.btn{border:none;border-radius:10px;padding:11px 22px;color:#fff;font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit}
.btn-ghost{background:transparent!important;border:1px solid #252D3A!important;color:#8896AA!important}
.btn-sm{padding:8px 14px!important;font-size:12px!important}
.badge{border-radius:7px;padding:2px 9px;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
.mono{font-family:'JetBrains Mono',monospace}
.sidebar{width:68px;flex-shrink:0;background:#131920;border-right:1px solid #252D3A;display:flex;flex-direction:column;align-items:center;padding:16px 8px;position:sticky;top:0;height:100vh;gap:4px;overflow-y:auto}
.nav-btn{width:44px;height:44px;border-radius:12px;border:1px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;font-size:18px;transition:all .17s;flex-shrink:0}
.nav-btn:hover{background:#1C2333}
.nav-btn.active{background:rgba(55,114,255,.11);border-color:rgba(55,114,255,.25)}
.conf-item{display:flex;align-items:center;gap:12px;border-radius:10px;padding:11px 14px;cursor:pointer;user-select:none;transition:all .15s;border:1px solid #252D3A;background:#0C1017}
.conf-item.on{background:rgba(55,114,255,.05);border-color:rgba(55,114,255,.3)}
.conf-check{width:20px;height:20px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;border:1.5px solid #3D4D63;background:transparent;transition:all .15s}
.conf-check.on{border:none;background:#3772FF}
.trade-row{border-radius:12px;padding:13px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .15s;border:1px solid #252D3A;background:#131920}
.trade-row:hover{background:#1C2333}
.toast{position:fixed;top:20px;right:20px;z-index:9999;border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.seccard{background:#131920;border:1px solid #252D3A;border-radius:14px;padding:20px 22px}
.seccard-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.secbar{width:3px;height:14px;border-radius:2px;display:inline-block}
.detail-item{background:#131920;border:1px solid #252D3A;border-radius:12px;padding:13px 16px}
.detail-lbl{font-size:10px;font-weight:600;color:#3D4D63;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.detail-val{font-size:15px;font-weight:600}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,createElement:h} = React;
const {AreaChart,Area,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,BarChart,Bar,ReferenceLine,Cell} = Recharts;

const C = {
bg:”#0B0E11”,surf:”#131920”,surf2:”#1C2333”,
bdr:”#252D3A”,acc:”#3772FF”,
profit:”#00C087”,loss:”#EF454A”,
text:”#E8EDF5”,muted:”#8896AA”,dim:”#3D4D63”,gold:”#F5A623”
};
const JOURNALS=[{id:“j1”,color:”#3772FF”,emoji:“📘”},{id:“j2”,color:”#00C087”,emoji:“📗”},{id:“j3”,color:”#F5A623”,emoji:“📙”}];
const PAIRS=[“EUR/USD”,“GBP/USD”,“USD/JPY”,“USD/CHF”,“AUD/USD”,“USD/CAD”,“NZD/USD”,“EUR/GBP”,“EUR/JPY”,“GBP/JPY”,“CHF/JPY”,“XAU/USD (GOLD)”];
const STRATEGIES=[“Continuation”,“Retournement”];
const EMOTIONS=[“😎 Confiant”,“😐 Neutre”,“😰 Stressé”,“🤑 Euphorique”,“😨 Craintif”,“😤 Frustré”,“🧘 Discipliné”,“😴 Fatigué”];
const CONF=[
{key:“r_zone”,ico:“🗺️”,label:“Zone Clé”,sub:“Ancienne Offre / Demande”},
{key:“r_sweep”,ico:“💧”,label:“Sweep de Liquidité”,sub:“Avant la cassure”},
{key:“r_bos”,ico:“⚡”,label:“Cassure Momentum”,sub:“BOS / CHoCH”},
{key:“r_fvg”,ico:“🎯”,label:“Imbalance FVG”,sub:“Fair Value Gap”},
{key:“r_inducement”,ico:“🎣”,label:“Inducement”,sub:“Liquidité avant retour”},
];
const DEF={pair:“EUR/USD”,direction:“BUY”,entryDate:””,exitDate:””,session:””,riskPercent:””,pnlPercent:””,pnlAmount:””,strategy:””,emotion:””,r_zone:false,r_sweep:false,r_bos:false,r_fvg:false,r_inducement:false,notes:””,screenshotEntry:null,screenshotEntryName:””,screenshotExit:null,screenshotExitName:””};

function detectSession(dt){
if(!dt)return””;
const h=new Date(dt).getUTCHours();
if(h>=7&&h<9)return”🔀 Overlap Tokyo/Londres”;
if(h>=12&&h<16)return”🔀 Overlap Londres/NY”;
if(h<9)return”🇯🇵 Tokyo”;if(h<12)return”🇬🇧 Londres”;
if(h<21)return”🇺🇸 New York”;return”🌙 Creux”;
}
function calcDur(e,s){
if(!e||!s)return null;
const d=new Date(s)-new Date(e);if(d<=0)return null;
const m=Math.floor(d/60000),dy=Math.floor(m/1440),h=Math.floor((m%1440)/60),mn=m%60;
if(dy>0)return`${dy}j ${h}h ${mn}min`;if(h>0)return`${h}h ${mn}min`;return`${mn} min`;
}

function Toast({msg,ok}){
return <div className=“toast” style={{background:ok?”#0A2219”:”#250B0C”,border:`1px solid ${ok?C.profit:C.loss}`,color:ok?C.profit:C.loss}}>
{ok?“✅”:“❌”} {msg}

  </div>;
}

function Stat({lbl,val,sub,col}){
return <div className=“card” style={{padding:“18px 20px”}}>
<div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:“uppercase”,letterSpacing:”.07em”,marginBottom:6}}>{lbl}</div>
<div className="mono" style={{fontSize:24,fontWeight:800,color:col,lineHeight:1.2}}>{val}</div>
{sub&&<div style={{fontSize:11,color:C.dim,marginTop:4}}>{sub}</div>}

  </div>;
}

function SecCard({title,col,children}){
return <div className="seccard">
<div className="seccard-title" style={{color:col||C.acc}}>
<span className="secbar" style={{background:col||C.acc}}/>
{title}
</div>
{children}

  </div>;
}

function TRow({trade,col,onSel}){
const pnl=parseFloat(trade.pnlPercent)||0;
return <div className=“trade-row” onClick={onSel} style={{”–jcol”:col}}>
<div style={{width:7,height:7,borderRadius:“50%”,background:pnl>0?C.profit:pnl<0?C.loss:C.dim,flexShrink:0}}/>
<div className="mono" style={{fontWeight:700,fontSize:14,minWidth:110}}>{trade.pair}</div>
<span className=“badge” style={{background:(trade.direction===“BUY”?C.profit:C.loss)+“1A”,color:trade.direction===“BUY”?C.profit:C.loss,border:`1px solid ${(trade.direction==="BUY"?C.profit:C.loss)}40`}}>{trade.direction}</span>
{trade.strategy&&<div style={{fontSize:12,color:C.muted,flex:1}}>{trade.strategy}</div>}
{trade.entryDate&&<div className="mono" style={{fontSize:11,color:C.dim}}>{new Date(trade.entryDate).toLocaleDateString(“fr”)}</div>}
{trade.pnlPercent&&<div className="mono" style={{fontSize:14,fontWeight:700,color:pnl>0?C.profit:pnl<0?C.loss:C.muted,minWidth:65,textAlign:“right”}}>{pnl>=0?”+”:””}{trade.pnlPercent}%</div>}
<span style={{color:C.dim}}>›</span>

  </div>;
}

function Selector({onOpen}){
const [names,setNames]=useState({j1:“Journal 1”,j2:“Journal 2”,j3:“Journal 3”});
const [stats,setStats]=useState({});
const [edit,setEdit]=useState(null);
const [tmp,setTmp]=useState(””);

useEffect(()=>{
try{const v=localStorage.getItem(“jnames”);if(v)setNames(JSON.parse(v));}catch{}
const s={};
for(const j of JOURNALS){
try{
const v=localStorage.getItem(“t-”+j.id);
const tr=v?JSON.parse(v):[];
const pnls=tr.map(t=>parseFloat(t.pnlPercent)||0);
const tot=pnls.reduce((a,b)=>a+b,0),w=pnls.filter(p=>p>0).length;
s[j.id]={n:tr.length,tot,w,l:pnls.filter(p=>p<0).length,wr:tr.length?Math.round((w/tr.length)*100):null};
}catch{s[j.id]={n:0,tot:0,w:0,l:0,wr:null};}
}
setStats(s);
},[]);

const saveName=(id)=>{
const next={…names,[id]:tmp||names[id]};
setNames(next);setEdit(null);
try{localStorage.setItem(“jnames”,JSON.stringify(next));}catch{}
};

return <div style={{minHeight:“100vh”,background:C.bg}}>
<header style={{borderBottom:`1px solid ${C.bdr}`,padding:“20px 32px”,display:“flex”,alignItems:“center”,gap:14}}>
<div style={{width:42,height:42,borderRadius:13,background:`linear-gradient(135deg,${C.acc},#1A4FD6)`,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:20}}>📈</div>
<div>
<div className=“mono” style={{fontWeight:700,fontSize:16,letterSpacing:”.04em”}}>FOREX JOURNAL</div>
<div style={{fontSize:11,color:C.dim,letterSpacing:”.1em”,textTransform:“uppercase”,marginTop:1}}>by Petit Médée</div>
</div>
</header>
<main style={{maxWidth:560,margin:“0 auto”,padding:“48px 20px”}}>
<div style={{textAlign:“center”,marginBottom:40}}>
<h1 style={{fontSize:28,fontWeight:800,marginBottom:8}}>Vos Journaux</h1>
<p style={{fontSize:14,color:C.muted}}>3 espaces indépendants — données séparées</p>
</div>
<div style={{display:“flex”,flexDirection:“column”,gap:16}}>
{JOURNALS.map(j=>{
const name=names[j.id],st=stats[j.id]||{n:0,tot:0,w:0,l:0,wr:null},isEd=edit===j.id;
return <div key={j.id} className=“card” style={{padding:“22px 24px”,cursor:“pointer”,transition:“all .22s”,border:`1.5px solid ${C.bdr}`}}
onMouseEnter={e=>{e.currentTarget.style.border=`1.5px solid ${j.color}60`;e.currentTarget.style.boxShadow=`0 8px 32px ${j.color}12`;}}
onMouseLeave={e=>{e.currentTarget.style.border=`1.5px solid ${C.bdr}`;e.currentTarget.style.boxShadow=“none”;}}
onClick={e=>{if(!isEd&&e.target.tagName!==“INPUT”&&e.target.tagName!==“BUTTON”)onOpen(j.id,name,j.color,j.emoji);}}>
<div style={{display:“flex”,alignItems:“center”,gap:14,marginBottom:14}}>
<div style={{width:50,height:50,borderRadius:14,background:j.color+“15”,border:`1.5px solid ${j.color}30`,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:26,flexShrink:0}}>{j.emoji}</div>
<div style={{flex:1}}>
{isEd?<div style={{display:“flex”,gap:7}} onClick={e=>e.stopPropagation()}>
<input value={tmp} onChange={e=>setTmp(e.target.value)} onKeyDown={e=>e.key===“Enter”&&saveName(j.id)} autoFocus className=“inp” style={{borderColor:j.color,flex:1,padding:“7px 11px”}}/>
<button onClick={()=>saveName(j.id)} style={{background:j.color,border:“none”,borderRadius:9,padding:“0 13px”,cursor:“pointer”,color:”#fff”,fontFamily:“inherit”,fontWeight:700}}>✓</button>
<button onClick={()=>setEdit(null)} style={{background:C.surf2,border:`1px solid ${C.bdr}`,borderRadius:9,padding:“0 10px”,cursor:“pointer”,color:C.muted,fontFamily:“inherit”}}>✕</button>
</div>:<div style={{fontSize:18,fontWeight:800}}>{name}</div>}
{!isEd&&<div style={{fontSize:11,color:C.muted,marginTop:3}}>{st.n} trade{st.n!==1?“s”:””}{st.wr!==null?” · Win Rate “+st.wr+”%”:””}</div>}
</div>
{!isEd&&<button onClick={e=>{e.stopPropagation();setEdit(j.id);setTmp(name);}} style={{background:“transparent”,border:`1px solid ${C.bdr}`,borderRadius:8,padding:“5px 11px”,cursor:“pointer”,color:C.muted,fontSize:11,fontFamily:“inherit”,flexShrink:0}}>✏️ Renommer</button>}
</div>
<div className="grid4" style={{marginBottom:14}}>
{[[“Trades”,””+st.n,j.color],[“P&L”,st.n?(st.tot>=0?”+”:””)+st.tot.toFixed(1)+”%”:”—”,st.tot>=0?C.profit:C.loss],[“Wins”,””+st.w,C.profit],[“Losses”,””+st.l,C.loss]].map(([l,v,c])=>(
<div key={l} style={{background:C.bg,borderRadius:10,padding:“9px 12px”}}>
<div style={{fontSize:10,color:C.dim,textTransform:“uppercase”,letterSpacing:”.06em”,marginBottom:3}}>{l}</div>
<div className="mono" style={{fontSize:18,fontWeight:700,color:c}}>{v}</div>
</div>
))}
</div>
<button onClick={()=>onOpen(j.id,name,j.color,j.emoji)} style={{background:`linear-gradient(135deg,${j.color},${j.color}99)`,border:“none”,borderRadius:11,padding:“12px”,color:”#fff”,fontWeight:700,fontSize:14,cursor:“pointer”,fontFamily:“inherit”,display:“flex”,alignItems:“center”,justifyContent:“center”,gap:8,width:“100%”}}>
Ouvrir {name} ›
</button>
</div>;
})}
</div>
</main>

  </div>;
}

function JApp({jid,jname,jcol,jemoji,onBack}){
const TK=“t-”+jid,NK=“n-”+jid;
const [trades,setTrades]=useState([]);
const [page,setPage]=useState(“dashboard”);
const [form,setForm]=useState(DEF);
const [sel,setSel]=useState(null);
const [editId,setEditId]=useState(null);
const [toast,setToast]=useState(null);
const [nt,setNt]=useState(””);
const [nd,setNd]=useState(””);
const [ns,setNs]=useState(“idle”);
const [nm,setNm]=useState(””);
const [filter,setFilter]=useState({pair:””,direction:””,strategy:””});
const feRef=useRef(),fsRef=useRef();

useEffect(()=>{
try{const v=localStorage.getItem(TK);if(v)setTrades(JSON.parse(v));}catch{}
try{const v=localStorage.getItem(NK);if(v){const c=JSON.parse(v);setNt(c.t||””);setNd(c.d||””);}}catch{}
},[]);

const saveTr=(next)=>{setTrades(next);try{localStorage.setItem(TK,JSON.stringify(next));}catch{}};
const toast$=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2800);};

const syncN=async(trade)=>{
if(!nt||!nd)return;setNs(“syncing”);
const sc=[“r_zone”,“r_sweep”,“r_bos”,“r_fvg”,“r_inducement”].filter(k=>trade[k]).length;
const pr={“Paire”:{title:[{text:{content:trade.pair||””}}]},“Direction”:{select:{name:trade.direction||“BUY”}},“Session”:{rich_text:[{text:{content:trade.session||””}}]},“Durée”:{rich_text:[{text:{content:calcDur(trade.entryDate,trade.exitDate)||”—”}}]},“Risque (%)”:{number:parseFloat(trade.riskPercent)||null},“P&L (%)”:{number:parseFloat(trade.pnlPercent)||null},“P&L ($)”:{number:parseFloat(trade.pnlAmount)||null},“Score”:{number:sc},“Émotion”:{rich_text:[{text:{content:trade.emotion||””}}]},“Notes”:{rich_text:[{text:{content:trade.notes||””}}]},“Zone Clé”:{checkbox:!!trade.r_zone},“Sweep”:{checkbox:!!trade.r_sweep},“BOS/CHoCH”:{checkbox:!!trade.r_bos},“FVG”:{checkbox:!!trade.r_fvg},“Inducement”:{checkbox:!!trade.r_inducement}};
if(trade.strategy)pr[“Stratégie”]={select:{name:trade.strategy}};
if(trade.entryDate)pr[“Date Entrée”]={date:{start:new Date(trade.entryDate).toISOString()}};
if(trade.exitDate)pr[“Date Sortie”]={date:{start:new Date(trade.exitDate).toISOString()}};
Object.keys(pr).forEach(k=>{if(pr[k]?.number===null)delete pr[k];});
try{
const res=await fetch(“https://api.notion.com/v1/pages”,{method:“POST”,headers:{“Authorization”:“Bearer “+nt,“Content-Type”:“application/json”,“Notion-Version”:“2022-06-28”},body:JSON.stringify({parent:{database_id:nd},properties:pr})});
if(res.ok){setNs(“success”);setNm(“Synchronisé ✓”);setTimeout(()=>{setNs(“idle”);setNm(””);},3000);}
else{setNs(“error”);setNm(“Erreur Notion”);setTimeout(()=>{setNs(“idle”);setNm(””);},5000);}
}catch{setNs(“error”);setNm(“Connexion impossible”);setTimeout(()=>{setNs(“idle”);setNm(””);},5000);}
};

const submit=()=>{
if(!form.pair||!form.entryDate){toast$(“Paire et date obligatoires”,false);return;}
const tr={…form,id:editId||Date.now().toString()};
const next=editId?trades.map(t=>t.id===editId?tr:t):[tr,…trades];
saveTr(next);setForm(DEF);setEditId(null);setPage(“history”);
toast$(editId?“Mis à jour ✓”:“Trade enregistré ✓”);
if(nt&&nd)syncN(tr);
};

const stats=(()=>{
const n=trades.length;
if(!n)return{n:0,w:0,l:0,wr:”—”,avg:”—”,tot:”—”,best:”—”,worst:”—”,totN:0};
const pnls=trades.map(t=>parseFloat(t.pnlPercent)||0);
const w=pnls.filter(p=>p>0).length,tot=pnls.reduce((a,b)=>a+b,0);
return{n,w,l:pnls.filter(p=>p<0).length,wr:Math.round((w/n)*100)+”%”,avg:(tot/n).toFixed(2)+”%”,tot:(tot>=0?”+”:””)+tot.toFixed(2)+”%”,best:Math.max(…pnls).toFixed(2)+”%”,worst:Math.min(…pnls).toFixed(2)+”%”,totN:tot};
})();

const chartData=(()=>{
const s=[…trades].sort((a,b)=>new Date(a.entryDate)-new Date(b.entryDate));
let c=0;
return s.map((t,i)=>{
const p=parseFloat(t.pnlPercent)||0;c=parseFloat((c+p).toFixed(2));
return{i:i+1,date:t.entryDate?new Date(t.entryDate).toLocaleDateString(“fr”,{day:“2-digit”,month:“2-digit”}):”#”+(i+1),cumul:c,pnl:parseFloat(p.toFixed(2)),pair:t.pair||”—”};
});
})();
const lastC=chartData.length?chartData[chartData.length-1].cumul:0;
const isPos=lastC>=0;

const filtered=trades.filter(t=>{
if(filter.pair&&t.pair!==filter.pair)return false;
if(filter.direction&&t.direction!==filter.direction)return false;
if(filter.strategy&&t.strategy!==filter.strategy)return false;
return true;
});

const NAV=[{id:“dashboard”,ico:“📊”,lbl:“Dashboard”},{id:“history”,ico:“📋”,lbl:“Historique”},{id:“settings”,ico:“⚙️”,lbl:“Paramètres”}];

const CTip=({active,payload})=>{
if(!active||!payload?.[0])return null;const d=payload[0].payload;
return<div style={{background:”#090D11”,border:`1px solid ${C.bdr}`,borderRadius:10,padding:“10px 13px”,fontSize:12}}>
<div style={{color:C.muted,marginBottom:3}}>#{d.i}·{d.date}·{d.pair}</div>
<div className="mono" style={{color:d.pnl>=0?C.profit:C.loss,fontWeight:700}}>Trade:{d.pnl>=0?”+”:””}{d.pnl}%</div>
<div className="mono" style={{color:d.cumul>=0?jcol:C.loss,fontWeight:700}}>Cumulé:{d.cumul>=0?”+”:””}{d.cumul}%</div>
</div>;
};
const BTip=({active,payload})=>{
if(!active||!payload?.[0])return null;const d=payload[0].payload;
return<div style={{background:”#090D11”,border:`1px solid ${C.bdr}`,borderRadius:10,padding:“10px 13px”,fontSize:12}}>
<div style={{color:C.muted,marginBottom:3}}>#{d.i}·{d.pair}</div>
<div className="mono" style={{color:d.pnl>=0?C.profit:C.loss,fontWeight:700}}>{d.pnl>=0?”+”:””}{d.pnl}%</div>
</div>;
};

return <div style={{minHeight:“100vh”,background:C.bg,display:“flex”}}>
{toast&&<Toast msg={toast.msg} ok={toast.ok}/>}

function App(){
const [cur,setCur]=useState(null);

if(cur)return <JApp jid={cur} jname={info.name} jcol={info.col} jemoji={info.emoji} onBack={()=>{setCur(null);setInfo(null);}}/>;
