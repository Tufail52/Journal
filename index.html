<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forex Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0B0E11;color:#E8EDF5;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#252D3A;border-radius:3px}
input[type="file"]{display:none!important}
.card{background:#131920;border:1px solid #252D3A;border-radius:14px;padding:18px 20px}
.inp{background:#0C1017;border:1px solid #252D3A;border-radius:10px;padding:11px 14px;color:#E8EDF5;font-size:14px;outline:none;font-family:inherit;width:100%}
.lbl{font-size:11px;font-weight:600;color:#8896AA;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;display:block}
.btn{border:none;border-radius:10px;padding:11px 20px;color:#fff;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}
.ghost{background:transparent;border:1px solid #252D3A;color:#8896AA;padding:8px 14px;font-size:12px}
.mono{font-family:'JetBrains Mono',monospace}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.gs{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.row{display:flex;align-items:center;gap:12px;background:#131920;border:1px solid #252D3A;border-radius:12px;padding:12px 16px;cursor:pointer;margin-bottom:8px}
.row:hover{background:#1C2333}
.sc{background:#131920;border:1px solid #252D3A;border-radius:14px;padding:20px 22px;margin-bottom:14px}
.sct{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.ci{display:flex;align-items:center;gap:11px;border:1px solid #252D3A;border-radius:10px;padding:11px 14px;cursor:pointer;margin-bottom:7px}
.toast{position:fixed;top:20px;right:20px;z-index:999;border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.main{display:flex;min-height:100vh}
.sb{width:64px;flex-shrink:0;background:#131920;border-right:1px solid #252D3A;display:flex;flex-direction:column;align-items:center;padding:14px 8px;gap:4px;position:sticky;top:0;height:100vh}
.nb{width:44px;height:44px;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;background:transparent;transition:all .15s}
.nb:hover{background:#1C2333}
.nb.on{background:#3772FF1C;outline:1px solid #3772FF40}
.ct{flex:1;display:flex;flex-direction:column;overflow:hidden}
.hd{background:rgba(11,14,17,.9);backdrop-filter:blur(12px);border-bottom:1px solid #252D3A;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.sc-area{flex:1;padding:24px;overflow-y:auto}
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#8896AA;font-size:16px">
    Chargement...
  </div>
</div>

<script>
// ── Constants ──
var JOURNALS = [{id:"j1",color:"#3772FF",emoji:"📘"},{id:"j2",color:"#00C087",emoji:"📗"},{id:"j3",color:"#F5A623",emoji:"📙"}];
var PAIRS = ["EUR/USD","GBP/USD","USD/JPY","USD/CHF","AUD/USD","USD/CAD","NZD/USD","EUR/GBP","EUR/JPY","GBP/JPY","CHF/JPY","XAU/USD (GOLD)"];
var STRATEGIES = ["Continuation","Retournement"];
var EMOTIONS = ["😎 Confiant","😐 Neutre","😰 Stressé","🤑 Euphorique","😨 Craintif","😤 Frustré","🧘 Discipliné","😴 Fatigué"];
var CONF = [
  {key:"r_zone",ico:"🗺️",label:"Zone Clé",sub:"Ancienne Offre / Demande"},
  {key:"r_sweep",ico:"💧",label:"Sweep de Liquidité",sub:"Avant la cassure"},
  {key:"r_bos",ico:"⚡",label:"Cassure Momentum",sub:"BOS / CHoCH"},
  {key:"r_fvg",ico:"🎯",label:"Imbalance FVG",sub:"Fair Value Gap"},
  {key:"r_inducement",ico:"🎣",label:"Inducement",sub:"Liquidité avant retour"}
];
var C = {bg:"#0B0E11",s:"#131920",s2:"#1C2333",b:"#252D3A",a:"#3772FF",p:"#00C087",l:"#EF454A",t:"#E8EDF5",m:"#8896AA",d:"#3D4D63",g:"#F5A623"};
var BLANK = {pair:"EUR/USD",direction:"BUY",entryDate:"",exitDate:"",session:"",riskPercent:"",pnlPercent:"",pnlAmount:"",strategy:"",emotion:"",r_zone:false,r_sweep:false,r_bos:false,r_fvg:false,r_inducement:false,notes:"",screenshotEntry:null,screenshotEntryName:"",screenshotExit:null,screenshotExitName:""};

// ── State ──
var S = {
  screen:"sel",
  jid:null,jname:"",jcol:"#3772FF",jemoji:"📘",
  page:"dash",
  trades:[],form:clone(BLANK),editId:null,sel:null,
  filter:{pair:"",dir:"",str:""},
  nt:"",nd:"",
  names:{j1:"Journal 1",j2:"Journal 2",j3:"Journal 3"},
  jstats:{},
  toastEl:null
};

function clone(o){return JSON.parse(JSON.stringify(o));}
function ls(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lss(k,v){try{localStorage.setItem(k,v);}catch(e){}}

function session(dt){
  if(!dt)return"";
  var h=new Date(dt).getUTCHours();
  if(h>=7&&h<9)return"🔀 Overlap Tokyo/Londres";
  if(h>=12&&h<16)return"🔀 Overlap Londres/NY";
  if(h<9)return"🇯🇵 Tokyo";
  if(h<12)return"🇬🇧 Londres";
  if(h<21)return"🇺🇸 New York";
  return"🌙 Creux";
}
function dur(e,s){
  if(!e||!s)return"";
  var d=new Date(s)-new Date(e);
  if(d<=0)return"";
  var m=Math.floor(d/60000),dy=Math.floor(m/1440),h=Math.floor((m%1440)/60),mn=m%60;
  if(dy>0)return dy+"j "+h+"h "+mn+"min";
  if(h>0)return h+"h "+mn+"min";
  return mn+" min";
}
function fd(d){return d?new Date(d).toLocaleDateString("fr",{day:"2-digit",month:"2-digit"}):"—";}
function fdf(d){return d?new Date(d).toLocaleString("fr"):"—";}
function pnlStr(p){var n=parseFloat(p)||0;return(n>=0?"+":"")+n.toFixed(2)+"%";}

function toast(msg,ok){
  if(S.toastEl)clearTimeout(S.toastEl);
  var el=document.getElementById("toast");
  if(el){
    el.textContent=(ok?"✅ ":"❌ ")+msg;
    el.style.display="flex";
    el.style.background=ok?"#0A2219":"#250B0C";
    el.style.border="1px solid "+(ok?C.p:C.l);
    el.style.color=ok?C.p:C.l;
    S.toastEl=setTimeout(function(){el.style.display="none";},2800);
  }
}

function loadJ(jid){
  var v=ls("t-"+jid);S.trades=v?JSON.parse(v):[];
  var n=ls("n-"+jid);S.nt="";S.nd="";
  if(n){var c=JSON.parse(n);S.nt=c.t||"";S.nd=c.d||"";}
}
function saveT(){lss("t-"+S.jid,JSON.stringify(S.trades));}
function loadNames(){
  var v=ls("jnames");if(v)S.names=JSON.parse(v);
  JOURNALS.forEach(function(j){
    var v=ls("t-"+j.id);var tr=v?JSON.parse(v):[];
    var pnls=tr.map(function(t){return parseFloat(t.pnlPercent)||0;});
    var tot=pnls.reduce(function(a,b){return a+b;},0);
    var w=pnls.filter(function(p){return p>0;}).length;
    S.jstats[j.id]={n:tr.length,tot:tot,w:w,l:pnls.filter(function(p){return p<0;}).length,wr:tr.length?Math.round((w/tr.length)*100):null};
  });
}
function stats(){
  var n=S.trades.length;
  if(!n)return{n:0,w:0,l:0,wr:"—",avg:"—",tot:"—",best:"—",worst:"—",tn:0};
  var pnls=S.trades.map(function(t){return parseFloat(t.pnlPercent)||0;});
  var w=pnls.filter(function(p){return p>0;}).length;
  var tot=pnls.reduce(function(a,b){return a+b;},0);
  return{n:n,w:w,l:pnls.filter(function(p){return p<0;}).length,
    wr:Math.round((w/n)*100)+"%",avg:(tot/n).toFixed(2)+"%",
    tot:(tot>=0?"+":"")+tot.toFixed(2)+"%",
    best:Math.max.apply(null,pnls).toFixed(2)+"%",
    worst:Math.min.apply(null,pnls).toFixed(2)+"%",tn:tot};
}

// ── Render ──
function render(){
  document.getElementById("root").innerHTML=buildAll();
  bind();
}

function buildAll(){
  var html='<div id="toast" class="toast" style="display:none"></div>';
  if(S.screen==="sel")html+=buildSel();
  else html+=buildJ();
  return html;
}

function buildSel(){
  loadNames();
  var rows=JOURNALS.map(function(j){
    var n=S.names[j.id];
    var st=S.jstats[j.id]||{n:0,tot:0,w:0,l:0,wr:null};
    var pnlc=st.tot>=0?C.p:C.l;
    var pnlv=st.n?(st.tot>=0?"+":"")+st.tot.toFixed(1)+"%":"—";
    return '<div class="card" style="margin-bottom:14px;cursor:pointer;border:1.5px solid '+C.b+';padding:22px" onclick="openJ(\''+j.id+'\',\''+n+'\',\''+j.color+'\',\''+j.emoji+'\')">'
      +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">'
      +'<div style="width:50px;height:50px;border-radius:14px;background:'+j.color+'15;border:1.5px solid '+j.color+'30;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">'+j.emoji+'</div>'
      +'<div style="flex:1"><div style="font-size:18px;font-weight:800">'+n+'</div>'
      +'<div style="font-size:11px;color:'+C.m+';margin-top:3px">'+st.n+' trade'+(st.n!==1?"s":"")+(st.wr!==null?" · Win Rate "+st.wr+"%":"")+'</div></div></div>'
      +'<div class="g4" style="margin-bottom:14px">'
      +[["Trades",""+st.n,j.color],["P&L",pnlv,pnlc],["Wins",""+st.w,C.p],["Losses",""+st.l,C.l]].map(function(a){
        return '<div style="background:'+C.bg+';border-radius:10px;padding:9px 12px"><div style="font-size:10px;color:'+C.d+';text-transform:uppercase;margin-bottom:3px">'+a[0]+'</div><div class="mono" style="font-size:18px;font-weight:700;color:'+a[2]+'">'+a[1]+'</div></div>';
      }).join("")
      +'</div>'
      +'<button class="btn" style="background:linear-gradient(135deg,'+j.color+','+j.color+'99);width:100%" onclick="event.stopPropagation();openJ(\''+j.id+'\',\''+n+'\',\''+j.color+'\',\''+j.emoji+'\')">Ouvrir '+n+' ›</button>'
      +'</div>';
  }).join("");

  return '<div style="min-height:100vh;background:'+C.bg+'">'
    +'<header style="border-bottom:1px solid '+C.b+';padding:20px 28px;display:flex;align-items:center;gap:14px">'
    +'<div style="width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,'+C.a+',#1A4FD6);display:flex;align-items:center;justify-content:center;font-size:20px">📈</div>'
    +'<div><div class="mono" style="font-weight:700;font-size:16px">FOREX JOURNAL</div>'
    +'<div style="font-size:11px;color:'+C.d+';letter-spacing:.1em;text-transform:uppercase">by Petit Médée</div></div></header>'
    +'<main style="max-width:540px;margin:0 auto;padding:40px 20px">'
    +'<div style="text-align:center;margin-bottom:36px"><h1 style="font-size:26px;font-weight:800;margin-bottom:8px">Vos Journaux</h1>'
    +'<p style="color:'+C.m+'">3 espaces indépendants</p></div>'
    +rows+'</main></div>';
}

function buildJ(){
  var NAV=[{id:"dash",ico:"📊",lbl:"Dashboard"},{id:"hist",ico:"📋",lbl:"Historique"},{id:"cfg",ico:"⚙️",lbl:"Paramètres"}];
  var titles={dash:"Tableau de Bord",hist:"Historique",cfg:"Paramètres",add:S.editId?"Modifier":"Nouveau Trade",det:"Détail du Trade"};
  var col=S.jcol;

  var sb='<div class="sb">'
    +'<button class="nb" onclick="backSel()" title="Retour" style="margin-bottom:10px;font-size:20px;color:'+C.m+'">‹</button>'
    +'<div title="'+S.jname+'" style="width:44px;height:44px;border-radius:12px;background:'+col+'18;border:1.5px solid '+col+'35;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px">'+S.jemoji+'</div>'
    +'<div style="width:28px;height:1px;background:'+C.b+';margin-bottom:6px"></div>'
    +NAV.map(function(n){return '<button class="nb'+(S.page===n.id?" on":"')+'" onclick="goPage(\''+n.id+'\')" title="'+n.lbl+'" style="'+(S.page===n.id?"color:"+col+";background:"+col+"1C;outline:1px solid "+col+"40":"")+'">'+ n.ico+'</button>';}).join("")
    +'<div style="flex:1"></div>'
    +'<div title="'+(S.nt&&S.nd?"Notion connecté":"Non connecté")+'" style="width:44px;height:44px;border-radius:12px;background:'+C.bg+';border:1px solid '+C.b+';display:flex;align-items:center;justify-content:center">'
    +'<div style="width:9px;height:9px;border-radius:50%;background:'+(S.nt&&S.nd?C.p:C.d)+';'+(S.nt&&S.nd?"box-shadow:0 0 7px "+C.p+"40":"")+' "></div></div>'
    +'</div>';

  var hd='<div class="hd">'
    +'<div><div style="font-size:17px;font-weight:700">'+titles[S.page]+'</div>'
    +'<div style="font-size:11px;color:'+C.m+';margin-top:2px">'+new Date().toLocaleDateString("fr",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+'</div></div>'
    +'<button class="btn" style="background:linear-gradient(135deg,'+col+','+col+'BB)" onclick="newTrade()">＋ Nouveau Trade</button>'
    +'</div>';

  var content="";
  if(S.page==="dash")content=buildDash();
  else if(S.page==="hist")content=buildHist();
  else if(S.page==="cfg")content=buildCfg();
  else if(S.page==="add")content=buildForm();
  else if(S.page==="det")content=buildDet();

  return '<div class="main">'+sb+'<div class="ct">'+hd+'<div class="sc-area">'+content+'</div></div></div>';
}

function buildDash(){
  var st=stats();var col=S.jcol;
  var sc='<div class="gs" style="margin-bottom:20px">'
    +[["Total",""+st.n,"",col],["Win Rate",st.wr,st.w+"W · "+st.l+"L",C.p],["P&L Total",st.tot,"",st.tn>=0?C.p:C.l],["P&L Moyen",st.avg,"","#A78BFA"],["Meilleur",st.best,"",C.p],["Pire",st.worst,"",C.l]].map(function(a){
      return '<div class="card" style="padding:16px 18px"><div style="font-size:11px;font-weight:600;color:'+C.m+';text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">'+a[0]+'</div><div class="mono" style="font-size:22px;font-weight:800;color:'+a[3]+';line-height:1.2">'+a[1]+'</div>'+(a[2]?'<div style="font-size:11px;color:'+C.d+';margin-top:3px">'+a[2]+'</div>':"")+'</div>';
    }).join("")
    +'</div>';

  if(!S.trades.length){
    return sc+'<div class="card" style="text-align:center;padding:56px 24px">'
      +'<div style="font-size:44px;margin-bottom:14px">'+S.jemoji+'</div>'
      +'<div style="font-size:16px;font-weight:700;color:'+C.m+';margin-bottom:8px">Aucun trade dans '+S.jname+'</div>'
      +'<div style="font-size:13px;color:'+C.d+';margin-bottom:20px">Enregistrez votre premier trade</div>'
      +'<button class="btn" style="background:linear-gradient(135deg,'+col+','+col+'BB);margin:0 auto" onclick="newTrade()">＋ Premier Trade</button>'
      +'</div>';
  }

  var rows=S.trades.slice(0,5).map(function(t){
    var pnl=parseFloat(t.pnlPercent)||0;
    return '<div class="row" onclick="viewTrade(\''+t.id+'\')">'
      +'<div style="width:7px;height:7px;border-radius:50%;background:'+(pnl>0?C.p:pnl<0?C.l:C.d)+';flex-shrink:0"></div>'
      +'<div class="mono" style="font-weight:700;font-size:14px;min-width:100px">'+t.pair+'</div>'
      +'<span style="background:'+(t.direction==="BUY"?C.p:C.l)+'1A;color:'+(t.direction==="BUY"?C.p:C.l)+';border:1px solid '+(t.direction==="BUY"?C.p:C.l)+'40;border-radius:7px;padding:2px 9px;font-size:12px;font-weight:700">'+t.direction+'</span>'
      +(t.strategy?'<div style="font-size:12px;color:'+C.m+';flex:1">'+t.strategy+'</div>':'<div style="flex:1"></div>')
      +(t.pnlPercent?'<div class="mono" style="font-size:13px;font-weight:700;color:'+(pnl>0?C.p:pnl<0?C.l:C.m)+'">'+pnlStr(t.pnlPercent)+'</div>':"")
      +'<span style="color:'+C.d+'">›</span></div>';
  }).join("");

  var more=S.trades.length>5?'<button onclick="goPage(\'hist\')" style="background:transparent;border:none;color:'+col+';cursor:pointer;font-size:13px;font-weight:600;margin-top:8px;font-family:inherit">Voir tous ('+S.trades.length+') →</button>':"";

  return sc
    +'<div style="font-size:11px;font-weight:700;color:'+C.m+';text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px">Derniers Trades</div>'
    +rows+more;
}

function buildHist(){
  var col=S.jcol;
  var fil=S.trades.filter(function(t){
    if(S.filter.pair&&t.pair!==S.filter.pair)return false;
    if(S.filter.dir&&t.direction!==S.filter.dir)return false;
    if(S.filter.str&&t.strategy!==S.filter.str)return false;
    return true;
  });

  var filters='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px">'
    +'<select class="inp" style="width:auto;padding:8px 12px;font-size:12px" onchange="setF(\'pair\',this.value)">'
    +'<option value="">Toutes les paires</option>'
    +PAIRS.map(function(o){return'<option value="'+o+'"'+(S.filter.pair===o?' selected':'')+'>'+o+'</option>';}).join("")
    +'</select>'
    +'<select class="inp" style="width:auto;padding:8px 12px;font-size:12px" onchange="setF(\'dir\',this.value)">'
    +'<option value="">Direction</option>'
    +["BUY","SELL"].map(function(o){return'<option value="'+o+'"'+(S.filter.dir===o?' selected':'')+'>'+o+'</option>';}).join("")
    +'</select>'
    +'<select class="inp" style="width:auto;padding:8px 12px;font-size:12px" onchange="setF(\'str\',this.value)">'
    +'<option value="">Stratégie</option>'
    +STRATEGIES.map(function(o){return'<option value="'+o+'"'+(S.filter.str===o?' selected':'')+'>'+o+'</option>';}).join("")
    +'</select>'
    +(S.filter.pair||S.filter.dir||S.filter.str?'<button class="btn ghost" onclick="resetF()">✕ Reset</button>':"")
    +'<div style="margin-left:auto;font-size:12px;color:'+C.m+'">'+fil.length+' trade'+(fil.length!==1?"s":"")+'</div>'
    +'</div>';

  var rows=fil.length?fil.map(function(t){
    var pnl=parseFloat(t.pnlPercent)||0;
    return '<div class="row" onclick="viewTrade(\''+t.id+'\')">'
      +'<div style="width:7px;height:7px;border-radius:50%;background:'+(pnl>0?C.p:pnl<0?C.l:C.d)+';flex-shrink:0"></div>'
      +'<div class="mono" style="font-weight:700;font-size:14px;min-width:100px">'+t.pair+'</div>'
      +'<span style="background:'+(t.direction==="BUY"?C.p:C.l)+'1A;color:'+(t.direction==="BUY"?C.p:C.l)+';border:1px solid '+(t.direction==="BUY"?C.p:C.l)+'40;border-radius:7px;padding:2px 9px;font-size:12px;font-weight:700">'+t.direction+'</span>'
      +(t.strategy?'<div style="font-size:12px;color:'+C.m+';flex:1">'+t.strategy+'</div>':'<div style="flex:1"></div>')
      +(t.entryDate?'<div class="mono" style="font-size:11px;color:'+C.d+'">'+fd(t.entryDate)+'</div>':"")
      +(t.pnlPercent?'<div class="mono" style="font-size:13px;font-weight:700;color:'+(pnl>0?C.p:pnl<0?C.l:C.m)+'">'+pnlStr(t.pnlPercent)+'</div>':"")
      +'<span style="color:'+C.d+'">›</span></div>';
  }).join(""):
  '<div class="card" style="text-align:center;padding:44px;color:'+C.d+'">Aucun trade trouvé</div>';

  return filters+rows;
}

function buildCfg(){
  var col=S.jcol;var st=stats();
  return '<div style="max-width:560px">'
    +'<div class="sc">'
    +'<div class="sct" style="color:'+col+'"><span style="width:3px;height:14px;background:'+col+';border-radius:2px;display:inline-block"></span>🔗 Connexion Notion</div>'

// ── Actions ──
function openJ(jid,jname,jcol,jemoji){
S.screen=“journal”;S.jid=jid;S.jname=jname;S.jcol=jcol;S.jemoji=jemoji;
S.page=“dash”;S.form=clone(BLANK);S.editId=null;S.sel=null;
loadJ(jid);render();
}
function backSel(){S.screen=“sel”;render();}
function goPage(p){S.page=p;render();}
function newTrade(){S.form=clone(BLANK);S.editId=null;S.page=“add”;render();}
function cancelForm(){S.form=clone(BLANK);S.editId=null;S.page=“hist”;render();}
function viewTrade(id){var t=S.trades.filter(function(x){return x.id===id;})[0];if(t){S.sel=t;S.page=“det”;render();}}
function editTrade(){S.form=clone(S.sel);S.editId=S.sel.id;S.page=“add”;render();}
function delTrade(){S.trades=S.trades.filter(function(t){return t.id!==S.sel.id;});saveT();S.sel=null;S.page=“hist”;render();toast(“Trade supprimé”,true);}
function setF(key,val){S.filter[key]=val;render();}
function resetF(){S.filter={pair:””,dir:””,str:””};render();}
function setF2(key,val){S.form[key]=val;render();}
function onEntryDate(val){S.form.entryDate=val;S.form.session=session(val);render();}
function togConf(key){S.form[key]=!S.form[key];render();}
function notionSave(){
var nt=document.getElementById(“nt-in”)?document.getElementById(“nt-in”).value:””;
var nd=document.getElementById(“nd-in”)?document.getElementById(“nd-in”).value:””;
S.nt=nt;S.nd=nd;lss(“n-”+S.jid,JSON.stringify({t:nt,d:nd}));
render();toast(“Sauvegardé ✓”,true);
}
function notionDisc(){S.nt=””;S.nd=””;lss(“n-”+S.jid,JSON.stringify({t:””,d:””}));render();toast(“Notion déconnecté”,true);}
function pickImg(inputId,field,nameField){
var el=document.getElementById(inputId);
if(!el||!el.files||!el.files[0])return;
var reader=new FileReader();
reader.onload=function(ev){S.form[field]=ev.target.result;S.form[nameField]=el.files[0].name;render();};
reader.readAsDataURL(el.files[0]);
}

function submitTrade(){
if(!S.form.pair||!S.form.entryDate){toast(“Paire et date obligatoires”,false);return;}
var tr=clone(S.form);tr.id=S.editId||””+Date.now();
if(S.editId){S.trades=S.trades.map(function(t){return t.id===S.editId?tr:t;});}
else{S.trades.unshift(tr);}
saveT();S.form=clone(BLANK);S.editId=null;S.page=“hist”;
render();toast(S.editId?“Mis à jour ✓”:“Trade enregistré ✓”,true);
if(S.nt&&S.nd)syncN(tr);
}

async function syncN(trade){
try{
var sc=[“r_zone”,“r_sweep”,“r_bos”,“r_fvg”,“r_inducement”].filter(function(k){return trade[k];}).length;
var pr={“Paire”:{title:[{text:{content:trade.pair||””}}]},“Direction”:{select:{name:trade.direction||“BUY”}},“Session”:{rich_text:[{text:{content:trade.session||””}}]},“P&L (%)”:{number:parseFloat(trade.pnlPercent)||null},“Score”:{number:sc}};
if(trade.strategy)pr[“Stratégie”]={select:{name:trade.strategy}};
if(trade.entryDate)pr[“Date Entrée”]={date:{start:new Date(trade.entryDate).toISOString()}};
Object.keys(pr).forEach(function(k){if(pr[k]&&pr[k].number===null)delete pr[k];});
var res=await fetch(“https://api.notion.com/v1/pages”,{method:“POST”,headers:{“Authorization”:“Bearer “+S.nt,“Content-Type”:“application/json”,“Notion-Version”:“2022-06-28”},body:JSON.stringify({parent:{database_id:S.nd},properties:pr})});
toast(res.ok?“Notion sync ✓”:“Erreur Notion”,res.ok);
}catch(e){toast(“Notion: erreur”,false);}
}

loadNames();
render();
