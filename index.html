<script>
// ── Data ──
var JDATA = {j1:{color:"#3772FF",emoji:"📘"},j2:{color:"#00C087",emoji:"📗"},j3:{color:"#F5A623",emoji:"📙"}};
var CONF_DEF = [
  {key:"r_zone",ico:"🗺️",label:"Zone Clé",sub:"Ancienne Offre / Demande"},
  {key:"r_sweep",ico:"💧",label:"Sweep de Liquidité",sub:"Avant la cassure"},
  {key:"r_bos",ico:"⚡",label:"Cassure Momentum",sub:"BOS / CHoCH"},
  {key:"r_fvg",ico:"🎯",label:"Imbalance FVG",sub:"Fair Value Gap"},
  {key:"r_inducement",ico:"🎣",label:"Inducement",sub:"Liquidité avant retour"}
];

// ── State ──
var jid = null, jcol = "#3772FF", jname = "", jemoji = "📘";
var trades = [], nt = "", nd = "", editId = null;
var conf = {r_zone:false,r_sweep:false,r_bos:false,r_fvg:false,r_inducement:false};
var imgEntry = null, imgExit = null, imgEntryName = "", imgExitName = "";

function ls(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lss(k,v){try{localStorage.setItem(k,v);}catch(e){}}

function toast(msg, ok) {
  var el = document.getElementById("toast");
  el.textContent = (ok ? "✅ " : "❌ ") + msg;
  el.style.display = "block";
  el.style.background = ok ? "#0A2219" : "#250B0C";
  el.style.border = "1px solid " + (ok ? "#00C087" : "#EF454A");
  el.style.color = ok ? "#00C087" : "#EF454A";
  setTimeout(function(){el.style.display="none";}, 2500);
}

function showPage(id) {
  ["p-home","p-journal","p-detail"].forEach(function(p){
    document.getElementById(p).classList.remove("show");
  });
  document.getElementById(id).classList.add("show");
}

function showTab(tab) {
  ["dash","add","hist","cfg"].forEach(function(t){
    document.getElementById("t-"+t).classList.remove("show");
    var el = document.getElementById("tab-"+t);
    if(el){el.style.color="#8896AA";}
  });
  document.getElementById("t-"+tab).classList.add("show");
  var tabEl = document.getElementById("tab-"+tab);
  if(tabEl) tabEl.style.color = jcol;
  if(tab==="dash") renderDash();
  if(tab==="hist") renderHist();
  if(tab==="cfg") renderCfg();
  if(tab==="add") renderForm();
}

// ── Home ──
function renderHome() {
  var names = {};
  try { var v=ls("jnames"); if(v) names=JSON.parse(v); } catch(e){}
  var html = "";
  ["j1","j2","j3"].forEach(function(id){
    var n = names[id] || {j1:"Journal 1",j2:"Journal 2",j3:"Journal 3"}[id];
    var col = JDATA[id].color, emo = JDATA[id].emoji;
    var v = ls("t-"+id); var tr = v?JSON.parse(v):[];
    var pnls = tr.map(function(t){return parseFloat(t.pnlPercent)||0;});
    var tot = pnls.reduce(function(a,b){return a+b;},0);
    var w = pnls.filter(function(p){return p>0;}).length;
    var wr = tr.length ? Math.round((w/tr.length)*100)+"%" : "—";
    var totStr = tr.length ? (tot>=0?"+":"")+tot.toFixed(1)+"%" : "—";
    html += '<div onclick="openJournal(\''+id+'\',\''+n+'\',\''+col+'\',\''+emo+'\')" style="background:#151921;border:1.5px solid #252D3A;border-radius:14px;padding:20px;margin-bottom:14px;cursor:pointer">'
      +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">'
      +'<div style="width:48px;height:48px;border-radius:12px;background:'+col+'15;border:1.5px solid '+col+'30;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">'+emo+'</div>'
      +'<div><div style="font-size:17px;font-weight:800">'+n+'</div>'
      +'<div style="font-size:12px;color:#8896AA">'+tr.length+' trade'+(tr.length!==1?"s":"")+(wr!=="—"?" · Win Rate "+wr:"")+'</div></div></div>'
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">'
      +[["Trades",""+tr.length,col],["P&L",totStr,tot>=0?"#00C087":"#EF454A"],["Wins",""+w,"#00C087"],["Losses",""+( tr.length-w),"#EF454A"]].map(function(a){
        return '<div style="background:#0B0E11;border-radius:8px;padding:8px 10px"><div style="font-size:10px;color:#3D4D63;text-transform:uppercase;margin-bottom:3px">'+a[0]+'</div><div style="font-size:17px;font-weight:700;color:'+a[2]+'">'+a[1]+'</div></div>';
      }).join("")+'</div>'
      +'<div style="background:linear-gradient(135deg,'+col+','+col+'99);border-radius:8px;padding:11px;text-align:center;color:#fff;font-weight:700;font-size:14px">Ouvrir '+n+' ›</div>'
      +'</div>';
  });
  document.getElementById("journal-list").innerHTML = html;
}

function openJournal(id, n, col, emo) {
  jid=id; jname=n; jcol=col; jemoji=emo;
  var v=ls("t-"+id); trades=v?JSON.parse(v):[];
  var nv=ls("n-"+id); nt=""; nd="";
  if(nv){try{var c=JSON.parse(nv);nt=c.t||"";nd=c.d||"";}catch(e){}}
  document.getElementById("j-name").textContent = n;
  document.getElementById("j-emoji").textContent = emo;
  showPage("p-journal");
  showTab("dash");
}

function goHome() {
  renderHome();
  showPage("p-home");
}

// ── Dashboard ──
function renderDash() {
  var pnls = trades.map(function(t){return parseFloat(t.pnlPercent)||0;});
  var w = pnls.filter(function(p){return p>0;}).length;
  var tot = pnls.reduce(function(a,b){return a+b;},0);
  var n = trades.length;
  var wr = n ? Math.round((w/n)*100)+"%" : "—";
  var avg = n ? (tot/n).toFixed(2)+"%" : "—";
  var totStr = n ? (tot>=0?"+":"")+tot.toFixed(2)+"%" : "—";
  var best = n ? Math.max.apply(null,pnls).toFixed(2)+"%" : "—";
  var worst = n ? Math.min.apply(null,pnls).toFixed(2)+"%" : "—";

  var sc = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'
    +[["Total",""+n,jcol],["Win Rate",wr,"#00C087"],["P&L Total",totStr,tot>=0?"#00C087":"#EF454A"],["P&L Moyen",avg,"#A78BFA"],["Meilleur",best,"#00C087"],["Pire",worst,"#EF454A"]].map(function(a){
      return '<div class="card"><div style="font-size:11px;font-weight:600;color:#8896AA;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">'+a[0]+'</div><div style="font-size:22px;font-weight:800;color:'+a[2]+'">'+a[1]+'</div></div>';
    }).join("")+'</div>';

  document.getElementById("dash-stats").outerHTML = sc;

  var rows = "";
  if(!n) {
    rows = '<div class="card" style="text-align:center;padding:40px 20px"><div style="font-size:40px;margin-bottom:12px">'+jemoji+'</div><div style="font-size:15px;color:#8896AA;margin-bottom:8px">Aucun trade</div><button onclick="showTab(\'add\')" class="btn" style="background:linear-gradient(135deg,'+jcol+','+jcol+'BB)">＋ Premier Trade</button></div>';
  } else {
    rows = '<div style="font-size:11px;font-weight:700;color:#8896AA;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Derniers trades</div>'
      + trades.slice(0,5).map(function(t){return tradeRow(t);}).join("");
    if(n>5) rows += '<button onclick="showTab(\'hist\')" style="background:transparent;border:none;color:'+jcol+';cursor:pointer;font-size:13px;font-weight:600;font-family:inherit">Voir tous ('+n+') →</button>';
  }
  document.getElementById("dash-trades").innerHTML = rows;
}

function tradeRow(t) {
  var pnl=parseFloat(t.pnlPercent)||0;
  var pc=pnl>0?"#00C087":pnl<0?"#EF454A":"#8896AA";
  var dc=t.direction==="BUY"?"#00C087":"#EF454A";
  return '<div class="row" onclick="viewTrade(\''+t.id+'\')">'
    +'<div style="width:7px;height:7px;border-radius:50%;background:'+(pnl>0?"#00C087":pnl<0?"#EF454A":"#3D4D63")+';flex-shrink:0"></div>'
    +'<div style="font-weight:700;font-size:14px;min-width:90px;font-family:monospace">'+t.pair+'</div>'
    +'<span style="background:'+dc+'1A;color:'+dc+';border:1px solid '+dc+'40;border-radius:6px;padding:2px 8px;font-size:12px;font-weight:700">'+t.direction+'</span>'
    +(t.strategy?'<div style="font-size:12px;color:#8896AA;flex:1">'+t.strategy+'</div>':'<div style="flex:1"></div>')
    +(t.pnlPercent?'<div style="font-size:13px;font-weight:700;color:'+pc+';font-family:monospace">'+(pnl>=0?"+":"")+t.pnlPercent+'%</div>':"")
    +'<span style="color:#3D4D63">›</span></div>';
}

// ── Historique ──
function renderHist() {
  var fp = document.getElementById("flt-pair").value;
  var fd = document.getElementById("flt-dir").value;
  var fil = trades.filter(function(t){
    if(fp&&t.pair!==fp)return false;
    if(fd&&t.direction!==fd)return false;
    return true;
  });
  var html = fil.length ? fil.map(function(t){return tradeRow(t);}).join("") :
    '<div class="card" style="text-align:center;padding:32px;color:#3D4D63">Aucun trade trouvé</div>';
  document.getElementById("hist-list").innerHTML = html;
}

// ── Formulaire ──
function renderForm() {
  // Confluences
  var cl = "";
  CONF_DEF.forEach(function(c){
    var on = conf[c.key];
    cl += '<div onclick="togConf(\''+c.key+'\')" style="display:flex;align-items:center;gap:11px;border:1px solid '+(on?jcol+"48":"#252D3A")+';border-radius:10px;padding:11px 13px;cursor:pointer;margin-bottom:7px;background:'+(on?jcol+"0D":"#0C1017")+'">'
      +'<div class="check" style="background:'+(on?jcol:"transparent")+';border:'+(on?"none":"1.5px solid #3D4D63")+'">'+(on?"✓":"")+'</div>'
      +'<span style="font-size:17px">'+c.ico+'</span>'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:600;color:'+(on?"#E8EDF5":"#8896AA")+'">'+c.label+'</div><div style="font-size:11px;color:#3D4D63">'+c.sub+'</div></div>'
      +'<span style="font-size:10px;font-weight:700;color:'+(on?jcol:"#3D4D63")+'">'+( on?"OUI":"NON")+'</span>'
      +'</div>';
  });
  document.getElementById("conf-list").innerHTML = cl;

  // Score
  var sc = CONF_DEF.filter(function(c){return conf[c.key];}).length;
  var sbox = document.getElementById("score-box");
  if(sc>0) {
    var scc = sc>=4?"#00C087":sc>=2?"#F5A623":"#EF454A";
    sbox.style.display="flex";
    sbox.style.background=scc+"0E";
    sbox.style.border="1px solid "+scc+"28";
    document.getElementById("score-val").textContent=sc+"/5 "+(sc>=4?"🔥":sc>=2?"👍":"⚠️");
    document.getElementById("score-val").style.color=scc;
  } else {
    sbox.style.display="none";
  }

  // Btn color
  document.getElementById("submit-btn").style.background="linear-gradient(135deg,"+jcol+","+jcol+"BB)";
  document.getElementById("form-title").textContent=editId?"Modifier le Trade":"Nouveau Trade";
  document.getElementById("submit-btn").textContent=editId?"💾 Mettre à Jour":"💾 Enregistrer";
}

function togConf(key) {
  conf[key]=!conf[key];
  renderForm();
}

function setDir(d) {
  var buy=document.getElementById("btn-buy");
  var sell=document.getElementById("btn-sell");
  if(d==="BUY"){
    buy.style.background="#00C0871E";buy.style.borderColor="#00C087";buy.style.color="#00C087";
    sell.style.background="#0C1017";sell.style.borderColor="#252D3A";sell.style.color="#8896AA";
  } else {
    sell.style.background="#EF454A1E";sell.style.borderColor="#EF454A";sell.style.color="#EF454A";
    buy.style.background="#0C1017";buy.style.borderColor="#252D3A";buy.style.color="#8896AA";
  }
}

function getDir(){
  var buy=document.getElementById("btn-buy");
  return buy&&buy.style.color==="#00C087"?"BUY":"SELL";
}

function getSession(dt){
  if(!dt)return"";
  var h=new Date(dt).getUTCHours();
  if(h>=7&&h<9)return"🔀 Overlap Tokyo/Londres";
  if(h>=12&&h<16)return"🔀 Overlap Londres/NY";
  if(h<9)return"🇯🇵 Tokyo";
  if(h<12)return"🇬🇧 Londres";
  if(h<21)return"🇺🇸 New York";
  return"🌙 Creux";
}

function getDur(e,s){
  if(!e||!s)return"";
  var d=new Date(s)-new Date(e);
  if(d<=0)return"";
  var m=Math.floor(d/60000),dy=Math.floor(m/1440),h=Math.floor((m%1440)/60),mn=m%60;
  if(dy>0)return dy+"j "+h+"h "+mn+"min";
  if(h>0)return h+"h "+mn+"min";
  return mn+" min";
}

function onEntryDate(){
  var v=document.getElementById("f-entry").value;
  var s=getSession(v);
  var sb=document.getElementById("session-box");
  if(s){sb.style.display="block";document.getElementById("session-val").textContent=s;}
  else{sb.style.display="none";}
  onExitDate();
}

function onExitDate(){
  var e=document.getElementById("f-entry").value;
  var s=document.getElementById("f-exit").value;
  var d=getDur(e,s);
  var db=document.getElementById("dur-box");
  if(d){db.style.display="block";document.getElementById("dur-val").textContent=d;}
  else{db.style.display="none";}
}

function pickImg(inputId,side){
  var el=document.getElementById(inputId);
  if(!el||!el.files||!el.files[0])return;
  var reader=new FileReader();
  var file=el.files[0];
  reader.onload=function(ev){
    if(side==="e"){
      imgEntry=ev.target.result;imgEntryName=file.name;
      document.getElementById("fe-name").textContent=file.name;
      var img=document.getElementById("fe-img");img.src=ev.target.result;img.style.display="block";
    } else {
      imgExit=ev.target.result;imgExitName=file.name;
      document.getElementById("fs-name").textContent=file.name;
      var img=document.getElementById("fs-img");img.src=ev.target.result;img.style.display="block";
    }
  };
  reader.readAsDataURL(file);
}

function clearForm(){
  document.getElementById("f-pair").value="EUR/USD";
  document.getElementById("f-entry").value="";
  document.getElementById("f-exit").value="";
  document.getElementById("f-risk").value="";
  document.getElementById("f-pnl").value="";
  document.getElementById("f-amt").value="";
  document.getElementById("f-strat").value="";
  document.getElementById("f-emo").value="";
  document.getElementById("f-notes").value="";
  document.getElementById("session-box").style.display="none";
  document.getElementById("dur-box").style.display="none";
  document.getElementById("fe-name").textContent="Ajouter";
  document.getElementById("fs-name").textContent="Ajouter";
  document.getElementById("fe-img").style.display="none";
  document.getElementById("fs-img").style.display="none";
  conf={r_zone:false,r_sweep:false,r_bos:false,r_fvg:false,r_inducement:false};
  imgEntry=null;imgExit=null;imgEntryName="";imgExitName="";
  setDir("BUY");editId=null;
  renderForm();
}

function cancelForm(){clearForm();showTab("hist");}

function submitForm(){
  var pair=document.getElementById("f-pair").value;
  var entry=document.getElementById("f-entry").value;
  if(!pair||!entry){toast("Paire et date obligatoires",false);return;}
  var t={
    id:editId||""+Date.now(),
    pair:pair,direction:getDir(),
    entryDate:entry,exitDate:document.getElementById("f-exit").value,
    session:getSession(entry),
    riskPercent:document.getElementById("f-risk").value,
    pnlPercent:document.getElementById("f-pnl").value,
    pnlAmount:document.getElementById("f-amt").value,
    strategy:document.getElementById("f-strat").value,
    emotion:document.getElementById("f-emo").value,
    notes:document.getElementById("f-notes").value,
    r_zone:conf.r_zone,r_sweep:conf.r_sweep,r_bos:conf.r_bos,r_fvg:conf.r_fvg,r_inducement:conf.r_inducement,
    screenshotEntry:imgEntry,screenshotEntryName:imgEntryName,
    screenshotExit:imgExit,screenshotExitName:imgExitName
  };
  if(editId){trades=trades.map(function(x){return x.id===editId?t:x;});}
  else{trades.unshift(t);}
  lss("t-"+jid,JSON.stringify(trades));
  toast(editId?"Mis à jour ✓":"Trade enregistré ✓",true);
  clearForm();showTab("hist");
  if(nt&&nd)syncNotion(t);
}

// ── Détail ──
function viewTrade(id){
  var t=null;
  trades.forEach(function(x){if(x.id===id)t=x;});
  if(!t)return;
  var pnl=parseFloat(t.pnlPercent)||0;
  var sc=CONF_DEF.filter(function(c){return t[c.key];}).length;
  var scc=sc>=4?"#00C087":sc>=2?"#F5A623":"#EF454A";
  var dur=getDur(t.entryDate,t.exitDate);
  var fd=function(d){return d?new Date(d).toLocaleString("fr"):"—";};

  var html='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px">'
    +'<span style="font-weight:800;font-size:18px;flex:1">'+t.pair+'</span>'
    +'<span style="background:'+(t.direction==="BUY"?"#00C087":"#EF454A")+'1A;color:'+(t.direction==="BUY"?"#00C087":"#EF454A")+';border:1px solid '+(t.direction==="BUY"?"#00C087":"#EF454A")+'40;border-radius:6px;padding:2px 10px;font-size:12px;font-weight:700">'+t.direction+'</span>'
    +(t.pnlPercent?'<span style="background:'+(pnl>=0?"#00C087":"#EF454A")+'1A;color:'+(pnl>=0?"#00C087":"#EF454A")+';border:1px solid '+(pnl>=0?"#00C087":"#EF454A")+'40;border-radius:6px;padding:2px 10px;font-size:12px;font-weight:700">'+(pnl>=0?"+":"")+t.pnlPercent+'%</span>':"")
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:16px">'
    +'<button onclick="editTrade(\''+t.id+'\')" style="flex:1;background:'+jcol+'1A;border:1px solid '+jcol+'44;border-radius:8px;padding:9px;cursor:pointer;color:'+jcol+';font-family:inherit;font-weight:600">✏️ Modifier</button>'
    +'<button onclick="deleteTrade(\''+t.id+'\')" style="flex:1;background:#EF454A1A;border:1px solid #EF454A44;border-radius:8px;padding:9px;cursor:pointer;color:#EF454A;font-family:inherit;font-weight:600">🗑️ Supprimer</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'
    +[["Paire",t.pair],["Session",t.session||"—"],["Date Entrée",fd(t.entryDate)],["Date Sortie",fd(t.exitDate)],["Durée",dur||"—"],["Risque",t.riskPercent?t.riskPercent+"%":"—"],["P&L %",t.pnlPercent?(pnl>=0?"+":"")+t.pnlPercent+"%":"—"],["P&L $",t.pnlAmount?t.pnlAmount+" $":"—"]].map(function(a){
      return '<div class="card" style="padding:11px 14px"><div style="font-size:10px;color:#3D4D63;text-transform:uppercase;margin-bottom:4px">'+a[0]+'</div><div style="font-size:14px;font-weight:600;font-family:monospace">'+a[1]+'</div></div>';
    }).join("")+'</div>'
    +(t.emotion?'<div class="card" style="padding:11px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font-size:20px">'+t.emotion.split(" ")[0]+'</span><div><div style="font-size:10px;color:#3D4D63;text-transform:uppercase;margin-bottom:2px">Émotion</div><div style="font-size:13px;font-weight:600">'+t.emotion+'</div></div></div>':"")
    +'<div class="card" style="margin-bottom:12px">'
    +'<div style="font-size:12px;font-weight:700;color:'+jcol+';text-transform:uppercase;margin-bottom:10px">✅ Confluences <span style="color:'+scc+'">'+sc+'/5</span></div>'
    +CONF_DEF.map(function(c){var on=!!t[c.key];return'<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px;opacity:'+(on?1:.3)+'">'
      +'<div style="width:18px;height:18px;border-radius:4px;background:'+(on?jcol:"transparent")+';border:'+(on?"none":"1.5px solid #3D4D63")+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700">'+(on?"✓":"")+'</div>'
      +'<span>'+c.ico+'</span><span style="font-size:13px;font-weight:600;color:'+(on?"#E8EDF5":"#8896AA")+'">'+c.label+'</span></div>';}).join("")
    +'</div>'
    +(t.notes?'<div class="card" style="margin-bottom:12px"><div style="font-size:11px;color:#3D4D63;text-transform:uppercase;margin-bottom:6px">📝 Notes</div><div style="font-size:14px;line-height:1.7">'+t.notes+'</div></div>':"");

  if(t.screenshotEntry||t.screenshotExit){
    html+='<div class="card" style="margin-bottom:12px"><div style="font-size:12px;font-weight:700;color:'+jcol+';text-transform:uppercase;margin-bottom:10px">📸 Captures</div>'
      +'<div style="display:grid;grid-template-columns:'+(t.screenshotEntry&&t.screenshotExit?"1fr 1fr":"1fr")+';gap:10px">'
      +(t.screenshotEntry?'<div><div style="font-size:10px;color:#00C087;font-weight:700;text-transform:uppercase;margin-bottom:6px">📈 Entrée</div><img src="'+t.screenshotEntry+'" style="width:100%;border-radius:8px;max-height:300px;object-fit:contain"/></div>':"")
      +(t.screenshotExit?'<div><div style="font-size:10px;color:#EF454A;font-weight:700;text-transform:uppercase;margin-bottom:6px">📉 Sortie</div><img src="'+t.screenshotExit+'" style="width:100%;border-radius:8px;max-height:300px;object-fit:contain"/></div>':"")
      +'</div></div>';
  }

  document.getElementById("detail-content").innerHTML=html;
  showPage("p-detail");
}

function goHist(){showPage("p-journal");showTab("hist");}

function editTrade(id){
  var t=null;trades.forEach(function(x){if(x.id===id)t=x;});if(!t)return;
  showPage("p-journal");showTab("add");
  setTimeout(function(){
    document.getElementById("f-pair").value=t.pair||"EUR/USD";
    document.getElementById("f-entry").value=t.entryDate||"";
    document.getElementById("f-exit").value=t.exitDate||"";
    document.getElementById("f-risk").value=t.riskPercent||"";
    document.getElementById("f-pnl").value=t.pnlPercent||"";
    document.getElementById("f-amt").value=t.pnlAmount||"";
    document.getElementById("f-strat").value=t.strategy||"";
    document.getElementById("f-emo").value=t.emotion||"";
    document.getElementById("f-notes").value=t.notes||"";
    setDir(t.direction==="SELL"?"SELL":"BUY");
    conf={r_zone:!!t.r_zone,r_sweep:!!t.r_sweep,r_bos:!!t.r_bos,r_fvg:!!t.r_fvg,r_inducement:!!t.r_inducement};
    imgEntry=t.screenshotEntry||null;imgEntryName=t.screenshotEntryName||"";
    imgExit=t.screenshotExit||null;imgExitName=t.screenshotExitName||"";
    if(imgEntry){document.getElementById("fe-img").src=imgEntry;document.getElementById("fe-img").style.display="block";document.getElementById("fe-name").textContent=imgEntryName;}
    if(imgExit){document.getElementById("fs-img").src=imgExit;document.getElementById("fs-img").style.display="block";document.getElementById("fs-name").textContent=imgExitName;}
    if(t.entryDate)onEntryDate();
    editId=id;renderForm();
  },50);
}

function deleteTrade(id){
  trades=trades.filter(function(t){return t.id!==id;});
  lss("t-"+jid,JSON.stringify(trades));
  toast("Trade supprimé",true);
  goHist();
}

// ── Config ──
function renderCfg(){
  document.getElementById("cfg-nt").value=nt;
  document.getElementById("cfg-nd").value=nd;
  var sb=document.getElementById("save-btn");
  sb.style.background="linear-gradient(135deg,"+jcol+","+jcol+"BB)";
  var disc=document.getElementById("btn-disc");
  disc.style.display=nt&&nd?"inline-block":"none";
  var ns=document.getElementById("notion-status");
  if(nt&&nd){
    ns.style.background="#00C0870F";ns.style.border="1px solid #00C08728";ns.style.color="#00C087";
    ns.textContent="✅ Notion connecté — sync auto activée";
  } else {
    ns.style.background="#3772FF0D";ns.style.border="1px solid #3772FF28";ns.style.color="#3772FF";
    ns.textContent="🔗 Entrez vos identifiants Notion";
  }
  var pnls=trades.map(function(t){return parseFloat(t.pnlPercent)||0;});
  var tot=pnls.reduce(function(a,b){return a+b;},0);
  var w=pnls.filter(function(p){return p>0;}).length;
  var n=trades.length;
  document.getElementById("cfg-stats").innerHTML=[
    ["Journal",jname],["Trades",""+n],
    ["Win Rate",n?Math.round((w/n)*100)+"%":"—"],
    ["P&L Total",n?(tot>=0?"+":"")+tot.toFixed(2)+"%":"—"]
  ].map(function(a){
    return '<div style="background:#0C1017;border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:#3D4D63;text-transform:uppercase;margin-bottom:3px">'+a[0]+'</div><div style="font-size:14px;font-weight:700;font-family:monospace">'+a[1]+'</div></div>';
  }).join("");
}

function notionSave(){
  nt=document.getElementById("cfg-nt").value;
  nd=document.getElementById("cfg-nd").value;
  lss("n-"+jid,JSON.stringify({t:nt,d:nd}));
  toast("Sauvegardé ✓",true);renderCfg();
}

function notionDisc(){
  nt="";nd="";lss("n-"+jid,JSON.stringify({t:"",d:""}));
  toast("Notion déconnecté",true);renderCfg();
}

async function syncNotion(trade){
  try{
    var sc=CONF_DEF.filter(function(c){return trade[c.key];}).length;
    var pr={
      "Paire":{title:[{text:{content:trade.pair||""}}]},
      "Direction":{select:{name:trade.direction||"BUY"}},
      "Session":{rich_text:[{text:{content:trade.session||""}}]},
      "Score":{number:sc}
    };
    if(trade.pnlPercent)pr["P&L (%)"]={number:parseFloat(trade.pnlPercent)};
    if(trade.strategy)pr["Stratégie"]={select:{name:trade.strategy}};
    if(trade.entryDate)pr["Date Entrée"]={date:{start:new Date(trade.entryDate).toISOString()}};
    var res=await fetch("https://api.notion.com/v1/pages",{method:"POST",headers:{"Authorization":"Bearer "+nt,"Content-Type":"application/json","Notion-Version":"2022-06-28"},body:JSON.stringify({parent:{database_id:nd},properties:pr})});
    toast(res.ok?"Notion ✓":"Erreur Notion",res.ok);
  }catch(e){toast("Notion: erreur",false);}
}

// ── Init ──
renderHome();
</script>
