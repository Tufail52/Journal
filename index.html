<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forex Journal — Petit Médée</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0B0E11;color:#E8EDF5;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0B0E11}::-webkit-scrollbar-thumb{background:#252D3A;border-radius:3px}
input[type="file"]{display:none!important}
select option{background:#131920}
textarea{resize:vertical;font-family:inherit}
.card{background:#131920;border:1px solid #252D3A;border-radius:14px}
.inp{background:#0C1017;border:1px solid #252D3A;border-radius:10px;padding:11px 14px;color:#E8EDF5;font-size:14px;outline:none;font-family:inherit;width:100%;box-sizing:border-box;transition:border-color .2s}
.lbl{font-size:11px;font-weight:600;color:#8896AA;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;display:block}
.btn{border:none;border-radius:10px;padding:11px 20px;color:#fff;font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-ghost{background:transparent!important;border:1px solid #252D3A!important;color:#8896AA!important}
.btn-sm{padding:8px 14px!important;font-size:12px!important}
.mono{font-family:'JetBrains Mono',monospace}
.flex{display:flex}.fdc{flex-direction:column}.aic{align-items:center}.jcsb{justify-content:space-between}.jcc{justify-content:center}
.g4{gap:4px}.g7{gap:7px}.g8{gap:8px}.g9{gap:9px}.g10{gap:10px}.g12{gap:12px}.g14{gap:14px}.g16{gap:16px}.g20{gap:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.sidebar{width:68px;flex-shrink:0;background:#131920;border-right:1px solid #252D3A;display:flex;flex-direction:column;align-items:center;padding:16px 8px;position:sticky;top:0;height:100vh;gap:4px;overflow-y:auto}
.nav-btn{width:44px;height:44px;border-radius:12px;border:1px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;font-size:18px;transition:all .17s;flex-shrink:0;color:#8896AA}
.nav-btn:hover{background:#1C2333;color:#E8EDF5}
.conf-item{display:flex;align-items:center;gap:12px;border-radius:10px;padding:11px 14px;cursor:pointer;user-select:none;transition:all .15s;border:1px solid #252D3A;background:#0C1017;margin-bottom:7px}
.trade-row{border-radius:12px;padding:13px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .15s;border:1px solid #252D3A;background:#131920;margin-bottom:7px}
.trade-row:hover{background:#1C2333}
.toast{position:fixed;top:20px;right:20px;z-index:9999;border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.6);transition:all .3s}
.seccard{background:#131920;border:1px solid #252D3A;border-radius:14px;padding:20px 22px;margin-bottom:16px}
.seccard-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.badge{border-radius:7px;padding:2px 9px;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
.hidden{display:none!important}
.page{display:none}.page.active{display:block}
#app{min-height:100vh}
.main-layout{display:flex;min-height:100vh}
.content-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.scroll-area{flex:1;padding:26px 28px 44px;overflow-y:auto}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── Data ─────────────────────────────────────────
const JOURNALS=[{id:"j1",color:"#3772FF",emoji:"📘"},{id:"j2",color:"#00C087",emoji:"📗"},{id:"j3",color:"#F5A623",emoji:"📙"}];
const PAIRS=["EUR/USD","GBP/USD","USD/JPY","USD/CHF","AUD/USD","USD/CAD","NZD/USD","EUR/GBP","EUR/JPY","GBP/JPY","CHF/JPY","XAU/USD (GOLD)"];
const STRATEGIES=["Continuation","Retournement"];
const EMOTIONS=["😎 Confiant","😐 Neutre","😰 Stressé","🤑 Euphorique","😨 Craintif","😤 Frustré","🧘 Discipliné","😴 Fatigué"];
const CONF=[
  {key:"r_zone",ico:"🗺️",label:"Zone Clé",sub:"Ancienne Offre / Demande"},
  {key:"r_sweep",ico:"💧",label:"Sweep de Liquidité",sub:"Avant la cassure"},
  {key:"r_bos",ico:"⚡",label:"Cassure Momentum",sub:"BOS / CHoCH"},
  {key:"r_fvg",ico:"🎯",label:"Imbalance FVG",sub:"Fair Value Gap"},
  {key:"r_inducement",ico:"🎣",label:"Inducement",sub:"Liquidité avant retour"},
];
const C={bg:"#0B0E11",surf:"#131920",surf2:"#1C2333",bdr:"#252D3A",acc:"#3772FF",profit:"#00C087",loss:"#EF454A",text:"#E8EDF5",muted:"#8896AA",dim:"#3D4D63",gold:"#F5A623"};
const DEF_FORM={pair:"EUR/USD",direction:"BUY",entryDate:"",exitDate:"",session:"",riskPercent:"",pnlPercent:"",pnlAmount:"",strategy:"",emotion:"",r_zone:false,r_sweep:false,r_bos:false,r_fvg:false,r_inducement:false,notes:"",screenshotEntry:null,screenshotEntryName:"",screenshotExit:null,screenshotExitName:""};

// ── State ─────────────────────────────────────────
let state={
  screen:"selector", // selector | journal
  jid:null,jname:null,jcol:null,jemoji:null,
  page:"dashboard",
  trades:[],
  form:{...DEF_FORM},
  editId:null,
  sel:null,
  filter:{pair:"",direction:"",strategy:""},
  nt:"",nd:"",
  names:{j1:"Journal 1",j2:"Journal 2",j3:"Journal 3"},
  jstats:{},
  toast:null,
  toastTimer:null,
};

function setState(patch){
  Object.assign(state,patch);
  render();
}

// ── Utils ─────────────────────────────────────────
function ls_get(k){try{return localStorage.getItem(k);}catch{return null;}}
function ls_set(k,v){try{localStorage.setItem(k,v);}catch{}}

function detectSession(dt){
  if(!dt)return"";
  const h=new Date(dt).getUTCHours();
  if(h>=7&&h<9)return"🔀 Overlap Tokyo/Londres";
  if(h>=12&&h<16)return"🔀 Overlap Londres/NY";
  if(h<9)return"🇯🇵 Tokyo";if(h<12)return"🇬🇧 Londres";
  if(h<21)return"🇺🇸 New York";return"🌙 Creux";
}
function calcDur(e,s){
  if(!e||!s)return null;
  const d=new Date(s)-new Date(e);if(d<=0)return null;
  const m=Math.floor(d/60000),dy=Math.floor(m/1440),h=Math.floor((m%1440)/60),mn=m%60;
  if(dy>0)return`${dy}j ${h}h ${mn}min`;if(h>0)return`${h}h ${mn}min`;return`${mn} min`;
}
function fmtDate(d){return d?new Date(d).toLocaleDateString("fr",{day:"2-digit",month:"2-digit"}):"—";}
function fmtFull(d){return d?new Date(d).toLocaleString("fr"):"—";}
function fmtPnl(p){const n=parseFloat(p)||0;return(n>=0?"+":"")+n.toFixed(2)+"%";}

function toast$(msg,ok=true){
  if(state.toastTimer)clearTimeout(state.toastTimer);
  const t=setTimeout(()=>setState({toast:null,toastTimer:null}),2800);
  setState({toast:{msg,ok},toastTimer:t});
}

function loadJournal(jid){
  const v=ls_get("t-"+jid);
  const trades=v?JSON.parse(v):[];
  const nv=ls_get("n-"+jid);
  let nt="",nd="";
  if(nv){const c=JSON.parse(nv);nt=c.t||"";nd=c.d||"";}
  setState({trades,nt,nd});
}

function loadNames(){
  const v=ls_get("jnames");
  if(v)state.names=JSON.parse(v);
  const js={};
  for(const j of JOURNALS){
    const v=ls_get("t-"+j.id);
    const tr=v?JSON.parse(v):[];
    const pnls=tr.map(t=>parseFloat(t.pnlPercent)||0);
    const tot=pnls.reduce((a,b)=>a+b,0),w=pnls.filter(p=>p>0).length;
    js[j.id]={n:tr.length,tot,w,l:pnls.filter(p=>p<0).length,wr:tr.length?Math.round((w/tr.length)*100):null};
  }
  state.jstats=js;
}

function saveTrades(next){
  ls_set("t-"+state.jid,JSON.stringify(next));
  setState({trades:next});
}

function openJournal(jid,jname,jcol,jemoji){
  setState({screen:"journal",jid,jname,jcol,jemoji,page:"dashboard",form:{...DEF_FORM},editId:null,sel:null});
  loadJournal(jid);
}

function computeStats(){
  const tr=state.trades;
  const n=tr.length;
  if(!n)return{n:0,w:0,l:0,wr:"—",avg:"—",tot:"—",best:"—",worst:"—",totN:0};
  const pnls=tr.map(t=>parseFloat(t.pnlPercent)||0);
  const w=pnls.filter(p=>p>0).length,tot=pnls.reduce((a,b)=>a+b,0);
  return{n,w,l:pnls.filter(p=>p<0).length,wr:Math.round((w/n)*100)+"%",avg:(tot/n).toFixed(2)+"%",
    tot:(tot>=0?"+":"")+tot.toFixed(2)+"%",best:Math.max(...pnls).toFixed(2)+"%",worst:Math.min(...pnls).toFixed(2)+"%",totN:tot};
}

function submitTrade(){
  const f=state.form;
  if(!f.pair||!f.entryDate){toast$("Paire et date obligatoires",false);return;}
  const tr={...f,id:state.editId||Date.now().toString()};
  const next=state.editId?state.trades.map(t=>t.id===state.editId?tr:t):[tr,...state.trades];
  saveTrades(next);
  setState({form:{...DEF_FORM},editId:null,page:"history"});
  toast$(state.editId?"Mis à jour ✓":"Trade enregistré ✓");
  if(state.nt&&state.nd)syncNotion(tr);
}

async function syncNotion(trade){
  const sc=["r_zone","r_sweep","r_bos","r_fvg","r_inducement"].filter(k=>trade[k]).length;
  const pr={"Paire":{title:[{text:{content:trade.pair||""}}]},"Direction":{select:{name:trade.direction||"BUY"}},"Session":{rich_text:[{text:{content:trade.session||""}}]},"Durée":{rich_text:[{text:{content:calcDur(trade.entryDate,trade.exitDate)||"—"}}]},"Risque (%)":{number:parseFloat(trade.riskPercent)||null},"P&L (%)":{number:parseFloat(trade.pnlPercent)||null},"P&L ($)":{number:parseFloat(trade.pnlAmount)||null},"Score":{number:sc},"Émotion":{rich_text:[{text:{content:trade.emotion||""}}]},"Notes":{rich_text:[{text:{content:trade.notes||""}}]},"Zone Clé":{checkbox:!!trade.r_zone},"Sweep":{checkbox:!!trade.r_sweep},"BOS/CHoCH":{checkbox:!!trade.r_bos},"FVG":{checkbox:!!trade.r_fvg},"Inducement":{checkbox:!!trade.r_inducement}};
  if(trade.strategy)pr["Stratégie"]={select:{name:trade.strategy}};
  if(trade.entryDate)pr["Date Entrée"]={date:{start:new Date(trade.entryDate).toISOString()}};
  if(trade.exitDate)pr["Date Sortie"]={date:{start:new Date(trade.exitDate).toISOString()}};
  Object.keys(pr).forEach(k=>{if(pr[k]?.number===null)delete pr[k];});
  try{
    const res=await fetch("https://api.notion.com/v1/pages",{method:"POST",headers:{"Authorization":"Bearer "+state.nt,"Content-Type":"application/json","Notion-Version":"2022-06-28"},body:JSON.stringify({parent:{database_id:state.nd},properties:pr})});
    toast$(res.ok?"Notion sync ✓":"Erreur Notion",res.ok);
  }catch{toast$("Notion: connexion impossible",false);}
}

// ── HTML Builders ─────────────────────────────────
function h(tag,attrs={},content=""){
  const a=Object.entries(attrs).map(([k,v])=>{
    if(k==="style"&&typeof v==="object")return`style="${Object.entries(v).map(([p,q])=>`${p.replace(/([A-Z])/g,"-$1").toLowerCase()}:${q}`).join(";")}"`;
    if(k==="class")return`class="${v}"`;
    if(k.startsWith("on"))return"";
    return`${k}="${v}"`;
  }).join(" ");
  const selfClose=["input","img","hr","br"].includes(tag);
  if(selfClose)return`<${tag} ${a}/>`;
  return`<${tag} ${a}>${Array.isArray(content)?content.join(""):content}</${tag}>`;
}

function btn(label,id,extra="",col=state.jcol){
  return`<button class="btn" style="background:linear-gradient(135deg,${col},${col}BB)" data-action="${id}" ${extra}>${label}</button>`;
}
function btnGhost(label,id,extra=""){
  return`<button class="btn btn-ghost btn-sm" data-action="${id}" ${extra}>${label}</button>`;
}
function inpField(label,key,type="text",ph="",req=false){
  const v=state.form[key]||"";
  return`<div><label class="lbl">${label}${req?` <span style="color:${C.gold}">*</span>`:""}</label><input class="inp" type="${type}" value="${v.toString().replace(/"/g,"&quot;")}" placeholder="${ph}" data-field="${key}" ${type==="datetime-local"?`oninput="handleField(event)"`:""} oninput="handleField(event)"/></div>`;
}
function selField(label,key,opts,withEmpty=true){
  const v=state.form[key]||"";
  const options=(withEmpty?`<option value="">— Choisir —</option>`:"")+opts.map(o=>`<option value="${o}"${v===o?" selected":""}>${o}</option>`).join("");
  return`<div><label class="lbl">${label}</label><select class="inp" style="cursor:pointer" data-field="${key}" onchange="handleField(event)">${options}</select></div>`;
}
function secCard(title,col,content){
  return`<div class="seccard"><div class="seccard-title" style="color:${col||C.acc}"><span style="width:3px;height:14px;background:${col||C.acc};border-radius:2px;display:inline-block"></span>${title}</div>${content}</div>`;
}
function statCard(lbl,val,sub,col){
  return`<div class="card" style="padding:18px 20px"><div style="font-size:11px;font-weight:600;color:${C.muted};text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">${lbl}</div><div class="mono" style="font-size:24px;font-weight:800;color:${col};line-height:1.2">${val}</div>${sub?`<div style="font-size:11px;color:${C.dim};margin-top:4px">${sub}</div>`:""}</div>`;
}
function detailItem(lbl,val){
  return`<div class="detail-item card" style="padding:13px 16px"><div style="font-size:10px;font-weight:600;color:${C.dim};text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">${lbl}</div><div class="mono" style="font-size:15px;font-weight:600">${val}</div></div>`;
}
function badgeHtml(text,col){
  return`<span class="badge mono" style="background:${col}1A;color:${col};border:1px solid ${col}40">${text}</span>`;
}

// ── Render ────────────────────────────────────────
function render(){
  document.getElementById("app").innerHTML=buildApp();
  attachEvents();
}

function buildApp(){
  let out="";
  // Toast
  if(state.toast){
    const col=state.toast.ok?C.profit:C.loss;
    out+=`<div class="toast" style="background:${state.toast.ok?"#0A2219":"#250B0C"};border:1px solid ${col};color:${col}">${state.toast.ok?"✅":"❌"} ${state.toast.msg}</div>`;
  }
  if(state.screen==="selector")out+=buildSelector();
  else out+=buildJournal();
  return out;
}

function buildSelector(){
  loadNames();
  const rows=JOURNALS.map(j=>{
    const name=state.names[j.id];
    const st=state.jstats[j.id]||{n:0,tot:0,w:0,l:0,wr:null};
    const stats=[["Trades",""+st.n,j.color],["P&L",st.n?(st.tot>=0?"+":"")+st.tot.toFixed(1)+"%":"—",st.tot>=0?C.profit:C.loss],["Wins",""+st.w,C.profit],["Losses",""+st.l,C.loss]];
    return`<div class="card" style="padding:22px 24px;margin-bottom:16px;border:1.5px solid ${C.bdr};cursor:pointer;transition:all .22s" onclick="openJournal('${j.id}','${name}','${j.color}','${j.emoji}')">
      <div class="flex aic g14" style="margin-bottom:14px">
        <div style="width:50px;height:50px;border-radius:14px;background:${j.color}15;border:1.5px solid ${j.color}30;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">${j.emoji}</div>
        <div style="flex:1"><div style="font-size:18px;font-weight:800">${name}</div><div style="font-size:11px;color:${C.muted};margin-top:3px">${st.n} trade${st.n!==1?"s":""}${st.wr!==null?" · Win Rate "+st.wr+"%":""}</div></div>
      </div>
      <div class="grid4" style="margin-bottom:14px">
        ${stats.map(([l,v,c])=>`<div style="background:${C.bg};border-radius:10px;padding:9px 12px"><div style="font-size:10px;color:${C.dim};text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">${l}</div><div class="mono" style="font-size:18px;font-weight:700;color:${c}">${v}</div></div>`).join("")}
      </div>
      <button class="btn" style="background:linear-gradient(135deg,${j.color},${j.color}99);width:100%;justify-content:center" onclick="event.stopPropagation();openJournal('${j.id}','${name}','${j.color}','${j.emoji}')">Ouvrir ${name} ›</button>
    </div>`;
  }).join("");

  return`<div style="min-height:100vh;background:${C.bg}">
    <header style="border-bottom:1px solid ${C.bdr};padding:20px 32px;display:flex;align-items:center;gap:14px">
      <div style="width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,${C.acc},#1A4FD6);display:flex;align-items:center;justify-content:center;font-size:20px">📈</div>
      <div><div class="mono" style="font-weight:700;font-size:16px;letter-spacing:.04em">FOREX JOURNAL</div><div style="font-size:11px;color:${C.dim};letter-spacing:.1em;text-transform:uppercase;margin-top:1px">by Petit Médée</div></div>
    </header>
    <main style="max-width:560px;margin:0 auto;padding:48px 20px">
      <div style="text-align:center;margin-bottom:40px">
        <h1 style="font-size:28px;font-weight:800;margin-bottom:8px">Vos Journaux</h1>
        <p style="font-size:14px;color:${C.muted}">3 espaces indépendants — données séparées</p>
      </div>
      ${rows}
    </main>
  </div>`;
}

function buildJournal(){
  const {jcol,jemoji,jname,page}=state;
  const NAV=[{id:"dashboard",ico:"📊",lbl:"Dashboard"},{id:"history",ico:"📋",lbl:"Historique"},{id:"settings",ico:"⚙️",lbl:"Paramètres"}];

  const sidebar=`<aside class="sidebar">
    <button class="nav-btn" title="Retour" data-action="back" style="margin-bottom:10px;font-size:20px">‹</button>
    <div title="${jname}" style="width:44px;height:44px;border-radius:12px;background:${jcol}18;border:1.5px solid ${jcol}35;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px">${jemoji}</div>
    <div style="width:28px;height:1px;background:${C.bdr};margin-bottom:6px"></div>
    ${NAV.map(({id,ico,lbl})=>`<button class="nav-btn${page===id?" active":""}" title="${lbl}" data-page="${id}" style="${page===id?`color:${jcol};background:${jcol}1C;border:1px solid ${jcol}40`:""}">${ico}</button>`).join("")}
    <div style="flex:1"></div>
    <div title="${state.nt&&state.nd?"Notion connecté":"Non connecté"}" style="width:44px;height:44px;border-radius:12px;background:${C.bg};border:1px solid ${C.bdr};display:flex;align-items:center;justify-content:center">
      <div style="width:9px;height:9px;border-radius:50%;background:${state.nt&&state.nd?C.profit:C.dim};box-shadow:${state.nt&&state.nd?`0 0 7px ${C.profit}40`:"none"}"></div>
    </div>
  </aside>`;

  const pageTitles={dashboard:"Tableau de Bord",history:"Historique des Trades",settings:"Paramètres",add:state.editId?"Modifier le Trade":"Nouveau Trade",detail:"Détail du Trade"};

  const header=`<header style="background:rgba(11,14,17,.9);backdrop-filter:blur(12px);border-bottom:1px solid ${C.bdr};padding:15px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50">
    <div>
      <div style="font-size:17px;font-weight:700">${pageTitles[page]||""}</div>
      <div style="font-size:11px;color:${C.muted};margin-top:2px">${new Date().toLocaleDateString("fr",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
    </div>
    ${btn("＋ Nouveau Trade","new-trade")}
  </header>`;

  let content="";
  if(page==="dashboard")content=buildDashboard();
  else if(page==="history")content=buildHistory();
  else if(page==="settings")content=buildSettings();
  else if(page==="add")content=buildForm();
  else if(page==="detail")content=buildDetail();

  return`<div class="main-layout">${sidebar}<div class="content-area">${header}<div class="scroll-area">${content}</div></div></div>`;
}

function buildDashboard(){
  const st=computeStats();
  const {jcol,jemoji,jname,trades}=state;

  const statCards=`<div class="stat-grid" style="margin-bottom:20px">
    ${statCard("Total",""+st.n,"",jcol)}
    ${statCard("Win Rate",st.wr,`${st.w}W · ${st.l}L`,C.profit)}
    ${statCard("P&L Total",st.tot,"",st.totN>=0?C.profit:C.loss)}
    ${statCard("P&L Moyen",st.avg,"","#A78BFA")}
    ${statCard("Meilleur",st.best,"",C.profit)}
    ${statCard("Pire",st.worst,"",C.loss)}
  </div>`;

  if(!trades.length){
    return statCards+`<div class="card" style="text-align:center;padding:60px 24px">
      <div style="font-size:46px;margin-bottom:14px">${jemoji}</div>
      <div style="font-size:17px;font-weight:700;color:${C.muted};margin-bottom:8px">Aucun trade dans ${jname}</div>

function buildMiniChart(){
  const trades=[...state.trades].sort((a,b)=>new Date(a.entryDate)-new Date(b.entryDate));
  if(!trades.length)return`<div style="color:${C.dim};font-size:12px;margin:auto">Aucun trade</div>`;
  let c=0;
  const data=trades.map(t=>{const p=parseFloat(t.pnlPercent)||0;c+=p;return{p,c};});
  const maxV=Math.max(...data.map(d=>Math.abs(d.c)),1);
  return data.map((d,i)=>{
    const h=Math.max(4,Math.abs(d.c)/maxV*60);
    const col=d.c>=0?C.profit:C.loss;
    return`<div title="${d.c>=0?"+":""}${d.c.toFixed(2)}%" style="flex:1;background:${col};opacity:.8;border-radius:3px 3px 0 0;height:${h}px;min-width:4px;align-self:flex-end"></div>`;
  }).join("");
}

// ── Event Handlers ────────────────────────────────
function attachEvents(){
// Nav buttons
document.querySelectorAll(”[data-page]”).forEach(el=>{
el.addEventListener(“click”,()=>setState({page:el.dataset.page}));
});
// Actions
document.querySelectorAll(”[data-action]”).forEach(el=>{
el.addEventListener(“click”,()=>handleAction(el.dataset.action));
});
// Trade rows
document.querySelectorAll(”[data-trade]”).forEach(el=>{
el.addEventListener(“click”,()=>{
const t=state.trades.find(x=>x.id===el.dataset.trade);
if(t)setState({sel:t,page:“detail”});
});
});
// Direction buttons
document.querySelectorAll(”[data-dir]”).forEach(el=>{
el.addEventListener(“click”,()=>{
state.form.direction=el.dataset.dir;
render();
});
});
// Confluence toggles
document.querySelectorAll(”[data-conf]”).forEach(el=>{
el.addEventListener(“click”,()=>{
state.form[el.dataset.conf]=!state.form[el.dataset.conf];
render();
});
});
// File inputs
const feIn=document.getElementById(“fe-input”);
const fsIn=document.getElementById(“fs-input”);
if(feIn)feIn.addEventListener(“change”,e=>handleFile(e,“screenshotEntry”,“screenshotEntryName”));
if(fsIn)fsIn.addEventListener(“change”,e=>handleFile(e,“screenshotExit”,“screenshotExitName”));
}

function handleAction(action){
const {jcol}=state;
if(action===“back”){setState({screen:“selector”,jid:null});loadNames();}
else if(action===“new-trade”){setState({form:{…DEF_FORM},editId:null,page:“add”});}
else if(action===“go-history”){setState({page:“history”});}
else if(action===“cancel-form”){setState({form:{…DEF_FORM},editId:null,page:“history”});}
else if(action===“submit-trade”){submitTrade();}
else if(action===“back-history”){setState({page:“history”,sel:null});}
else if(action===“edit-trade”){setState({form:{…state.sel},editId:state.sel.id,page:“add”});}
else if(action===“delete-trade”){
const next=state.trades.filter(t=>t.id!==state.sel.id);
saveTrades(next);setState({page:“history”,sel:null});toast$(“Trade supprimé”);
}
else if(action===“reset-filter”){setState({filter:{pair:””,direction:””,strategy:””}});}
else if(action===“pick-entry”){document.getElementById(“fe-input”)?.click();}
else if(action===“pick-exit”){document.getElementById(“fs-input”)?.click();}
else if(action===“notion-save”){
const nt=document.getElementById(“nt-input”)?.value||””;
const nd=document.getElementById(“nd-input”)?.value||””;
ls_set(“n-”+state.jid,JSON.stringify({t:nt,d:nd}));
setState({nt,nd});toast$(“Sauvegardé ✓”);
}
else if(action===“notion-disconnect”){
ls_set(“n-”+state.jid,JSON.stringify({t:””,d:””}));
setState({nt:””,nd:””});toast$(“Notion déconnecté”);
}
}

function handleField(e){
const key=e.target.dataset.field;
if(key){state.form[key]=e.target.value;render();}
}

function handleEntryDate(e){
const val=e.target.value;
state.form.entryDate=val;
state.form.session=detectSession(val);
render();
}

function handleFilter(e){
const key=e.target.dataset.filter;
if(key){state.filter[key]=e.target.value;render();}
}

function handleFile(e,field,nameField){
const file=e.target.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=ev=>{state.form[field]=ev.target.result;state.form[nameField]=file.name;render();};
reader.readAsDataURL(file);
}

// Global functions for inline handlers
window.openJournal=openJournal;
window.handleField=handleField;
window.handleEntryDate=handleEntryDate;
window.handleFilter=handleFilter;

// ── Init ─────────────────────────────────────────
loadNames();
render();
</script>
